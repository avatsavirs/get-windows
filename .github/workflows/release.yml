name: Build & publish binary node

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
        host:
          - x64
        target:
          - x64
        node:
          - 18
        include:
          - os: windows-latest
            node: 18
            host: x86
            target: x86

    name: ${{ matrix.os }} (node=${{ matrix.node }}, host=${{ matrix.host }}, target=${{ matrix.target }})
    steps:
      - uses: actions/checkout@v5

      - name: Add msbuild to PATH
        uses: microsoft/setup-msbuild@v2
        with:
          msbuild-architecture: ${{ matrix.target }}

      - name: Setup node (node=${{ matrix.node }}, host=${{ matrix.host }})
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          architecture: ${{ matrix.host }}
      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Align package version with release tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: npm pkg set "version=${GITHUB_REF#refs/tags/v}"

      - name: Add env vars
        shell: bash
        run: |
          echo "V=1" >> $GITHUB_ENV
          if [ "${{ matrix.target }}" = "x86" ]; then
            echo "TARGET=ia32" >> $GITHUB_ENV
          else
            echo "TARGET=${{ matrix.target }}" >> $GITHUB_ENV
          fi
      - name: Configure build
        run: ./node_modules/.bin/node-pre-gyp configure --target_arch=${{ env.TARGET }}

      - name: Build binaries
        run: ./node_modules/.bin/node-pre-gyp build --target_arch=${{ env.TARGET }}

      - name: Package prebuilt binaries
        run: ./node_modules/.bin/node-pre-gyp package --target_arch=${{ env.TARGET }}

      # Run only for matrix.node 18
      - name: Upload binaries to commit artifacts
        uses: actions/upload-artifact@v4
        if: matrix.node == 18
        with:
          name: prebuilt-binaries-${{ matrix.target }}
          path: build/stage/*/*
          retention-days: 7

      # Run only for matrix.node 18
      - name: Upload binaries to GitHub Release
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release upload "$TAG" build/stage/*/* --repo "$GITHUB_REPOSITORY" --clobber
        if: matrix.node == 18 && startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}

  build-macos:
    name: Build macOS Swift binary
    runs-on: macos-latest
    if: github.event_name == 'release'
    steps:
      - uses: actions/checkout@v5

      - name: Build macOS binary
        run: npm run build:macos

      - name: Upload macOS binary
        uses: actions/upload-artifact@v4
        with:
          name: macos-binary
          path: main

  publish-package:
    name: Publish package to npm (public)
    runs-on: ubuntu-latest
    needs: [build, build-macos]
    if: github.event_name == 'release'
    steps:
      - uses: actions/checkout@v5

      - name: Download macOS binary
        uses: actions/download-artifact@v4
        with:
          name: macos-binary

      - name: Restore macOS binary permissions
        run: chmod 755 main

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Align package version with release tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: npm pkg set "version=${GITHUB_REF#refs/tags/v}"

      - name: Rewrite package metadata for current repository
        shell: bash
        run: |
          SCOPE="${NPM_SCOPE:-${GITHUB_REPOSITORY_OWNER}}"
          SCOPE="$(echo "${SCOPE}" | tr '[:upper:]' '[:lower:]')"
          BASE_NAME="$(node -p "require('./package.json').name.split('/').pop()")"

          npm pkg set "name=@${SCOPE}/${BASE_NAME}"
          npm pkg set "repository.type=git"
          npm pkg set "repository.url=git+https://github.com/${GITHUB_REPOSITORY}.git"
          npm pkg set "binary.host=https://github.com/${GITHUB_REPOSITORY}/releases/download/"
          npm pkg set "publishConfig.registry=https://registry.npmjs.org"

      - name: Resolve dist tag
        id: dist-tag
        shell: bash
        run: |
          TAG="latest"
          if [ "${{ github.event.release.prerelease }}" = "true" ]; then
            TAG="beta"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Publish package
        run: npm publish --access public --tag "${{ steps.dist-tag.outputs.tag }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_SCOPE: ${{ vars.NPM_SCOPE }}
